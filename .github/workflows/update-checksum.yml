name: Update Checksum

on:
  push:
    branches:
      - main
    paths:
      - 'install.sh'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: update-checksum-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  update-checksum:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate checksum
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            if ! git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qx "install.sh"; then
              echo "install.sh was not changed in this PR; skipping checksum enforcement."
              exit 0
            fi
          fi

          sha256sum install.sh > /tmp/install.sh.sha256
          if diff -u install.sh.sha256 /tmp/install.sh.sha256; then
            echo "Checksum is up to date."
            exit 0
          fi

          echo ""
          echo "install.sh.sha256 is out of date."
          echo "Run: shasum -a 256 install.sh > install.sh.sha256"
          exit 1
